<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STERIX — Coming Soon</title>
<meta name="description" content="STERIX Medical Robotics. Robotics that work. Outcomes that matter." />
<meta name="theme-color" content="#0a1220" />

<meta property="og:title" content="STERIX — Coming Soon" />
<meta property="og:description" content="Robotics that work. Outcomes that matter." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://sterix.us" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root {
    --ink: #ffffff;
    --ink-soft: rgba(255, 255, 255, 0.78);
    --ink-mute: rgba(255, 255, 255, 0.55);
    --bg: #0a1220;
    --font: "Manrope", ui-sans-serif, system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--font);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  ::selection { background: #ffffff; color: #0a1220; }

  /* ---- background video ---- */
  .bg-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* lighter tint — just enough for white text to read */
  .bg-tint {
    position: fixed;
    inset: 0;
    z-index: 1;
    background:
      radial-gradient(ellipse at center, rgba(10, 18, 32, 0.05) 0%, rgba(10, 18, 32, 0.18) 70%, rgba(10, 18, 32, 0.32) 100%);
    pointer-events: none;
  }

  /* fallback while video loads or if it fails */
  .bg-video[poster] { background: var(--bg); }

  /* ---- content ---- */
  .stage {
    position: relative;
    z-index: 2;
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  .logo {
    margin-bottom: 36px;
    opacity: 0;
    transform: translateY(-18px) scale(0.94);
    filter: blur(8px);
    animation: logoIn 1.2s cubic-bezier(.2,.8,.2,1) 0.25s forwards;
  }

  .logo img {
    width: clamp(150px, 18vw, 240px);
    height: auto;
    display: block;
    filter: drop-shadow(0 6px 28px rgba(0, 0, 0, 0.45));
  }

  h1 {
    font-weight: 800;
    font-size: clamp(40px, 8vw, 112px);
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--ink);
    text-shadow: 0 2px 30px rgba(0, 0, 0, 0.35);
    opacity: 0;
    transform: translateY(40px);
    animation: titleIn 1.3s cubic-bezier(.16,.84,.24,1) 1.25s forwards;
  }

  .tagline {
    margin-top: 28px;
    font-weight: 400;
    font-size: clamp(15px, 1.3vw, 19px);
    letter-spacing: 0.01em;
    color: var(--ink-soft);
    max-width: 540px;
    line-height: 1.5;
    opacity: 0;
    transform: translateY(14px);
    animation: rise 1s cubic-bezier(.2,.7,.2,1) 1.85s forwards;
  }

  .url {
    margin-top: 56px;
    font-weight: 500;
    font-size: clamp(13px, 1vw, 15px);
    letter-spacing: 0.18em;
    color: var(--ink);
    text-decoration: none;
    text-transform: lowercase;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.35);
    transition: border-color 0.3s ease, color 0.3s ease;
    opacity: 0;
    transform: translateY(14px);
    animation: rise 1s cubic-bezier(.2,.7,.2,1) 2.15s forwards;
  }

  .url:hover {
    border-bottom-color: var(--ink);
    color: #ffffff;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes logoIn {
    0%   { opacity: 0; transform: translateY(-18px) scale(0.94); filter: blur(8px); }
    60%  { opacity: 1; filter: blur(0); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  @keyframes titleIn {
    0%   { opacity: 0; transform: translateY(40px); letter-spacing: 0.22em; }
    100% { opacity: 1; transform: translateY(0); letter-spacing: 0.04em; }
  }

  /* ---- sound toggle ---- */
  .sound-toggle {
    position: fixed;
    right: 28px;
    bottom: 28px;
    z-index: 4;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px 10px 14px;
    background: rgba(10, 18, 32, 0.45);
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: 999px;
    color: var(--ink);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
    opacity: 0;
    animation: rise 1s cubic-bezier(.2,.7,.2,1) 2.4s forwards;
  }

  .sound-toggle:hover {
    background: rgba(10, 18, 32, 0.65);
    border-color: rgba(255, 255, 255, 0.45);
  }

  .sound-toggle:active { transform: scale(0.97); }

  .sound-toggle svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .sound-toggle .icon-on { display: none; }
  .sound-toggle.is-on .icon-on { display: block; }
  .sound-toggle.is-on .icon-off { display: none; }

  .sound-toggle .label-on { display: none; }
  .sound-toggle.is-on .label-on { display: inline; }
  .sound-toggle.is-on .label-off { display: none; }

  @media (max-width: 540px) {
    .sound-toggle { right: 16px; bottom: 16px; padding: 8px 12px 8px 10px; font-size: 11px; }
  }

  /* ---- responsive tweaks ---- */
  @media (max-width: 540px) {
    .stage { padding: 32px 20px; }
    .logo { margin-bottom: 28px; }
    .logo img { width: clamp(130px, 36vw, 180px); }
    h1 { font-size: clamp(40px, 13vw, 72px); }
    .tagline { margin-top: 20px; font-size: 14px; }
    .url { margin-top: 36px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .logo, h1, .tagline, .url, .sound-toggle {
      animation: none;
      opacity: 1;
      transform: none;
      filter: none;
    }
  }
</style>
</head>

<body>

<video class="bg-video"
       src="commingsoon.mp4"
       autoplay
       muted
       loop
       playsinline
       preload="auto"
       poster=""
       aria-hidden="true"></video>

<div class="bg-tint" aria-hidden="true"></div>

<main class="stage">

  <div class="logo">
    <img src="ChatGPT%20Image%20Apr%2029,%202026,%2012_18_21%20PM.png"
         alt="STERIX Medical Robotics" />
  </div>

  <h1>COMING SOON</h1>

  <p class="tagline">Robotics that work. Outcomes that matter.</p>

  <a class="url" href="https://sterix.us">sterix.us</a>

</main>

<button class="sound-toggle" id="soundToggle" aria-label="Toggle sound" type="button">
  <svg class="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M11 5L6 9H2v6h4l5 4V5z"/>
    <line x1="22" y1="9" x2="16" y2="15"/>
    <line x1="16" y1="9" x2="22" y2="15"/>
  </svg>
  <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M11 5L6 9H2v6h4l5 4V5z"/>
    <path d="M15.54 8.46a5 5 0 010 7.07"/>
    <path d="M19.07 4.93a10 10 0 010 14.14"/>
  </svg>
  <span class="label-off">Sound&nbsp;off</span>
  <span class="label-on">Sound&nbsp;on</span>
</button>

<script>
  const v = document.querySelector('.bg-video');
  const toggle = document.getElementById('soundToggle');

  // ensure playback resumes when ready or after first interaction
  v.addEventListener('canplay', () => v.play().catch(() => {}));
  const kick = () => { v.play().catch(() => {}); };
  window.addEventListener('click', kick, { once: true });
  window.addEventListener('touchstart', kick, { once: true });

  // sound toggle — browsers require a user gesture to unmute
  toggle.addEventListener('click', () => {
    v.muted = !v.muted;
    if (!v.muted) {
      v.volume = 0.75;
      v.play().catch(() => {});
      toggle.classList.add('is-on');
      toggle.setAttribute('aria-label', 'Mute sound');
    } else {
      toggle.classList.remove('is-on');
      toggle.setAttribute('aria-label', 'Unmute sound');
    }
  });
</script>

</body>
</html>
